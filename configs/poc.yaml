paths:
  database: data/processed/roboquant.duckdb
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  model_dir: models
  report_dir: reports

market:
  markets: ["KOSPI", "KOSDAQ"]
  benchmark_code: "1001"
  benchmark_name: "KOSPI"
  start_date: "2019-01-01"
  end_date: null
  min_trading_value_20d: 1000000000

collection:
  sleep_seconds: 0.05
  max_symbols: null

horizons:
  3M: 63
  6M: 126
  1Y: 252
  2Y: 504

features:
  columns:
    - ret_21d
    - ret_63d
    - ret_126d
    - ret_252d
    - ma_gap_20d
    - ma_gap_60d
    - ma_gap_120d
    - ma_gap_250d
    - volatility_20d
    - volatility_60d
    - volume_ratio_20d
    - trading_value_ma20
    - close_to_52w_high
    - rsi_14
    - momentum_score
    - volatility_score
    - liquidity_score
    - risk_score
    - market_cap_score
    - value_score
    - quality_score
    - supply_demand_score
    - sentiment_score
    - foreign_net_value_20d_sum
    - institution_net_value_20d_sum
    - retail_net_value_20d_sum
    - foreign_net_20d_to_mcap
    - institution_net_20d_to_value
    - retail_overheat_score
    - foreign_consecutive_buy_days
    - institution_consecutive_buy_days
    - consensus_upside_pct
    - consensus_momentum_30_90
    - target_up_count_30d
    - target_down_count_30d
    - new_coverage_count_30d
    - target_revision_balance_30d
    - consensus_revision_score
    - target_upside_score
    - analyst_reliability_score
    - weighted_analyst_reliability_score

model:
  random_state: 42
  validation_fraction: 0.2
  min_train_rows: 1000
  min_train_dates: 252
  walk_forward:
    enabled: true
    initial_train_days: 504
    step_days: 21
    max_splits: null

recommendation:
  top_k: [10, 20, 50]
  default_top_k: 20
  weights:
    pred_prob_top20: 0.35
    pred_return_score: 0.20
    value_score: 0.10
    quality_score: 0.05
    momentum_score: 0.10
    supply_demand_score: 0.10
    consensus_revision_score: 0.05
    target_upside_score: 0.03
    analyst_reliability_score: 0.04
    new_coverage_score: 0.03
    sentiment_score: 0.05
    liquidity_score: 0.10
    risk_penalty: -0.20
  missing_factor_default: 0.5
  max_reasons: 5
  min_reasons: 3

backtest:
  rebalance_frequency: "M"
  transaction_cost_bps: 30
  benchmark_name: "KOSPI"

pipeline:
  train_horizons: ["3M", "6M"]
  report_horizons: ["3M", "6M"]

analyst:
  min_reports_for_score: 5
  recent_window_days: 365
  import_first: true
