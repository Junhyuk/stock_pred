paths:
  database: data/processed/roboquant.duckdb
  raw_dir: data/raw
  interim_dir: data/interim
  processed_dir: data/processed
  model_dir: models/top50_normal
  report_dir: reports/top50_normal

market:
  markets: ["KOSPI", "KOSDAQ"]
  benchmark_code: "1001"
  benchmark_name: "KOSPI"
  start_date: "2019-01-01"
  end_date: null
  min_trading_value_20d: 1000000000

universe:
  rule: prediction_top_market_cap
  kospi_target: 30
  kosdaq_target: 20

collection:
  sleep_seconds: 0.05
  max_symbols: 50

horizons:
  2M: 42
  3M: 63
  6M: 126
  9M: 189
  1Y: 252

features:
  columns:
    - ret_21d
    - ret_63d
    - ret_126d
    - ret_252d
    - ma_gap_20d
    - ma_gap_60d
    - ma_gap_120d
    - ma_gap_250d
    - volatility_20d
    - volatility_60d
    - volume_ratio_20d
    - trading_value_ma20
    - close_to_52w_high
    - rsi_14
    - momentum_score
    - volatility_score
    - liquidity_score
    - risk_score
    - market_cap_score
    - value_score
    - quality_score
    - supply_demand_score
    - sentiment_score
    - foreign_net_value_20d_sum
    - institution_net_value_20d_sum
    - retail_net_value_20d_sum
    - foreign_net_20d_to_mcap
    - institution_net_20d_to_value
    - retail_overheat_score
    - foreign_consecutive_buy_days
    - institution_consecutive_buy_days
    - consensus_upside_pct
    - consensus_momentum_30_90
    - target_up_count_30d
    - target_down_count_30d
    - new_coverage_count_30d
    - target_revision_balance_30d
    - consensus_revision_score
    - target_upside_score
    - analyst_reliability_score
    - weighted_analyst_reliability_score
    - koru_return_1d
    - koru_volume_ratio_20d
    - ewy_return_1d
    - koru_ewy_spread_1d
    - koru_leverage_drift_1d
    - koru_impact_score
    - koru_market_shock_flag
    - kospi_return_1d
    - kosdaq_return_1d
    - telegram_attention_score
    - telegram_sentiment_score
    - telegram_urgency_score
    - telegram_risk_score
    - telegram_semiconductor_score
    - telegram_macro_score
    - news_headline_count_1d
    - news_headline_count_3d
    - news_attention_score
    - news_sentiment_score
    - news_urgency_score
    - news_risk_score
    - news_semiconductor_score
    - news_macro_score
    - news_flow_score
    - news_negative_count_3d
    - news_negative_ratio_3d
    - news_negative_attention_score
    - news_bias_adjusted_sentiment_score
    - news_source_diversity_score
    - x_news_count_24h
    - x_news_count_3d
    - x_news_negative_count_3d
    - x_news_negative_attention_score
    - x_news_bias_adjusted_sentiment_score
    - us_sector_return_1d
    - us_sector_return_5d
    - us_sector_zscore_20d
    - us_sector_beta_60d
    - us_sector_corr_60d
    - us_sector_impact_score
    - us_sector_direction_agreement
  exclusions: {}

koru:
  include_6m_features: false
  market_shock_threshold: -0.02

telegram:
  include_6m_features: false

news_signals:
  include_6m_features: false
  negative_weight: 2.0
  positive_weight: 0.75
  negative_sentiment_threshold: 0.45
  positive_sentiment_threshold: 0.60

us_sector_linkage:
  include_6m_features: false
  config: configs/global_market.yaml

model:
  random_state: 42
  validation_fraction: 0.2
  min_train_rows: 1000
  min_train_dates: 252
  walk_forward:
    enabled: true
    initial_train_days: 504
    step_days: 21
    max_splits: null

recommendation:
  top_k: [10, 20]
  default_top_k: 20
  weights:
    pred_prob_top20: 0.35
    pred_return_score: 0.20
    value_score: 0.10
    quality_score: 0.05
    momentum_score: 0.10
    supply_demand_score: 0.10
    consensus_revision_score: 0.05
    target_upside_score: 0.03
    analyst_reliability_score: 0.04
    new_coverage_score: 0.03
    sentiment_score: 0.05
    liquidity_score: 0.10
    risk_penalty: -0.20
  missing_factor_default: 0.5
  max_reasons: 5
  min_reasons: 3

backtest:
  rebalance_frequency: "M"
  transaction_cost_bps: 30
  benchmark_name: "KOSPI"

long_short:
  horizons:
    short: 2M
    long: 6M
  long_count: 10
  short_count: 10
  gross_long: 0.5
  gross_short: 0.5
  market_split:
    enabled: true
    kospi_target: 30
    kosdaq_target: 20
  rebalance_frequency:
    2M: M
    6M: Q
  transaction_cost_bps: 30
  min_trading_value_20d: 1000000000

market_up_down:
  enabled: true
  upside_count: 10
  downside_count: 10
  horizons: [2M, 6M]
  market_split:
    enabled: true
    kospi_target: 30
    kosdaq_target: 20
  min_trading_value_20d: 1000000000

market_outlook:
  prediction_horizon: 2M
  shock_threshold: -0.02
  index_weight: 0.65
  breadth_weight: 0.35
  next_day_range_multiplier: 1.25
  use_pykrx_calendar: true
  krx_holidays: []

market_credit_balance:
  enabled: true
  source: data_go_kr_kofia
  endpoint: ""
  timeout_seconds: 20

market_move_explanations:
  threshold: 0.02
  lookback_days: 14
  prediction_horizon: 2M

news:
  enabled: true
  provider: naver_search_api
  query_template: "{name} 주가"
  display: 10
  sort: date

pipeline:
  train_horizons: ["2M", "3M", "6M", "9M", "1Y"]
  report_horizons: ["3M", "6M", "9M", "1Y"]
  long_short_horizons: ["2M", "6M"]

analyst:
  min_reports_for_score: 5
  recent_window_days: 365
  import_first: true
