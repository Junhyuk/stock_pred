paths:
  database: data/processed/roboquant.duckdb

collection:
  interval_minutes: 30
  request_timeout_seconds: 15
  max_entries_per_feed: 50

# 공식 RSS만 사용한다. URL 미확인 소스는 enabled: false 로 두고 placeholder를 남긴다.
feeds:
  - source: fed_press
    name: Federal Reserve Press Releases
    feed_url: https://www.federalreserve.gov/feeds/press_all.xml
    default_category: macro
    enabled: true

  # 한국은행 공식 RSS — 운영 전 공식 사이트에서 feed URL을 확인한 뒤 enabled: true 로 전환
  - source: bok_kr
    name: 한국은행 보도자료
    feed_url: ""
    default_category: macro
    enabled: false

  # 국민연금공단 공식 RSS — URL 확인 후 활성화
  - source: nps_kr
    name: 국민연금공단
    feed_url: ""
    default_category: flow
    enabled: false

  # 금융위원회 공식 RSS — URL 확인 후 활성화
  - source: fsc_kr
    name: 금융위원회
    feed_url: ""
    default_category: macro
    enabled: false

